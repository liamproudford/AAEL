<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page-header">
    <div class="page-header-inner">
        <h1 class="page-title">Leaderboard</h1>
        <p class="page-subtitle">Top Star Wars Quiz Scores</p>
    </div>
</div>

<div class="characters-section">
    <table style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="color: #FFE81F; border-bottom: 1px solid #2a2a2a;">
                <th style="padding:10px;">Rank</th>
                <th style="padding:10px;">Name</th>
                <th style="padding:10px;">Score</th>
            </tr>
        </thead>
        <tbody>
            {% for score in scores %}
            <tr style="text-align:center; border-bottom: 1px solid #2a2a2a;">
                <td style="padding:10px;">{{ loop.index }}</td>
                <td style="padding:10px;">{{ score[0] }}</td>
                <td style="padding:10px;">{{ score[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div style="text-align:center; margin-top: 20px;">
        <a href="/" class="page-btn">Play Again</a>
    </div>
</div>

</body>
</html>
