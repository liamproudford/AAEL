{% extends "base.html" %}

{% block title %}Compare — Star Wars Explorer{% endblock %}

{% block content %}
<section class="page-header">
    <div class="page-header-inner">
        <p class="hero-eyebrow">Who Would Win?</p>
        <h1 class="page-title">Character Showdown</h1>
        <p class="page-subtitle">{{ progress }} — Cast your vote and see how the galaxy agrees.</p>
    </div>
</section>

<section class="compare-section">
    <div class="versus-container">
        <div class="versus-character">
            <h2 class="character-name">{{ character1 }}</h2>
            <form method="post" action="/compare/vote">
                <input type="hidden" name="matchup_id" value="{{ matchup_id }}">
                <input type="hidden" name="winner_name" value="{{ character1 }}">
                <button type="submit" class="vote-btn">Vote {{ character1 }}</button>
            </form>
        </div>

        <div class="versus-divider">
            <span class="versus-text">VS</span>
        </div>

        <div class="versus-character">
            <h2 class="character-name">{{ character2 }}</h2>
            <form method="post" action="/compare/vote">
                <input type="hidden" name="matchup_id" value="{{ matchup_id }}">
                <input type="hidden" name="winner_name" value="{{ character2 }}">
                <button type="submit" class="vote-btn">Vote {{ character2 }}</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
